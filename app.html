<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="theme-color" content="#8E9AAF">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="计划清单">
<link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><rect fill=%22%238E9AAF%22 width=%22100%22 height=%22100%22 rx=%2220%22/><text x=%2250%22 y=%2255%22 text-anchor=%22middle%22 font-size=%2250%22>📋</text></svg>">
<title>📋 计划清单</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box;}
  body{
    font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','Microsoft YaHei',sans-serif;
    background:linear-gradient(135deg,#8E9AAF,#8E7B8C);
    min-height:100vh;display:flex;justify-content:center;align-items:flex-start;
    padding:32px 16px;
  }
  .container{
    background:#FDFBFA;border-radius:14px;box-shadow:0 20px 60px rgba(0,0,0,.15);
    width:100%;max-width:1200px;overflow:hidden;
  }
  /* Header */
  .header{
    background:linear-gradient(135deg,#8E9AAF,#8E7B8C);color:#FDFBFA;
    padding:18px 24px;text-align:center;
  }
  .header h1{font-size:24px;font-weight:700;margin-bottom:2px;}
  .header .date-display{font-size:14px;opacity:.85;}
  .stats{display:flex;justify-content:center;gap:20px;margin-top:8px;}
  .stat{text-align:center;min-width:48px;}
  .stat-num{font-size:26px;font-weight:700;}
  .stat-label{font-size:13px;opacity:.75;}
  /* Main body: 3 columns */
  .main-body{display:flex;border-top:1px solid #EBE8E6;}
  .col-left{flex:0 0 230px;border-right:1px solid #EBE8E6;display:flex;flex-direction:column;background:#F8F7F5;}
  .col-center{flex:1 1 auto;min-width:400px;display:flex;flex-direction:column;border-right:1px solid #EBE8E6;}
  .col-right{flex:0 0 380px;min-width:340px;display:flex;flex-direction:column;}
  /* Block header */
  .block-header{
    display:flex;align-items:center;gap:6px;padding:10px 16px;font-size:15px;
    font-weight:600;color:#5C5957;border-bottom:1px solid #EBE8E6;background:#F7F6F5;flex-shrink:0;
  }
  .block-header .block-badge{
    font-size:13px;padding:2px 8px;border-radius:8px;color:#FDFBFA;font-weight:500;margin-left:auto;
  }
  .block-badge.todo{background:#8E9AAF;}
  .block-badge.cd{background:#C4A882;}
  .block-badge.cu{background:#C49E9E;}
  /* Input area */
  .input-area{padding:10px 16px;border-bottom:1px solid #EBE8E6;flex-shrink:0;}
  .input-area.locked{display:none;}
  .input-row{display:flex;gap:5px;margin-bottom:6px;}
  .input-row input[type="text"]{flex:1;padding:7px 10px;border:2px solid #D5D2D0;border-radius:8px;font-size:15px;outline:none;transition:border-color .2s;}
  .input-row input[type="text"]:focus{border-color:#8E9AAF;}
  .input-row button{padding:7px 16px;background:linear-gradient(135deg,#8E9AAF,#8E7B8C);color:#FDFBFA;border:none;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer;transition:transform .15s,box-shadow .15s;white-space:nowrap;}
  .input-row button:hover{transform:translateY(-1px);box-shadow:0 4px 12px rgba(140,150,170,.35);}
  .input-row button.cd-btn{background:linear-gradient(135deg,#C4A882,#C4A882);}
  .input-row button.cd-btn:hover{box-shadow:0 4px 12px rgba(190,160,120,.35);}
  .input-row button.cu-btn{background:linear-gradient(135deg,#C49E9E,#D4A9B5);}
  .input-row button.cu-btn:hover{box-shadow:0 4px 12px rgba(190,150,150,.35);}
  /* Type selector */
  .type-selector{display:flex;gap:4px;flex-wrap:wrap;}
  .type-btn{padding:4px 10px;border:1.5px solid #D5D2D0;background:#FDFBFA;border-radius:14px;font-size:13px;cursor:pointer;transition:all .2s;color:#908D8B;}
  .type-btn:hover{border-color:#8E9AAF;color:#8E9AAF;}
  .type-btn.selected{background:#8E9AAF;border-color:#8E9AAF;color:#FDFBFA;}
  .type-btn.daily.selected{background:#8B9E82;border-color:#8B9E82;}
  .type-btn.weekly.selected{background:#C4A882;border-color:#C4A882;}
  .type-btn.once.selected{background:#8A9BAD;border-color:#8A9BAD;}
  /* Extra options */
  .extra-options{display:none;margin-top:5px;padding:7px 10px;background:#F4F3F1;border-radius:7px;animation:fadeIn .2s;}
  .extra-options.show{display:flex;flex-wrap:wrap;align-items:center;gap:5px;}
  .extra-options.inline{display:flex;flex-wrap:wrap;align-items:center;gap:5px;}
  @keyframes fadeIn{from{opacity:0;transform:translateY(-4px)}to{opacity:1;transform:translateY(0)}}
  .extra-options label{font-size:14px;color:#5C5957;font-weight:500;}
  .extra-options input[type="date"]{padding:4px 7px;border:1.5px solid #D5D2D0;border-radius:6px;font-size:14px;outline:none;color:#2C2927;}
  .extra-options input[type="date"]:focus{border-color:#8E9AAF;}
  /* Weekday chips */
  .weekday-chips{display:flex;gap:3px;flex-wrap:wrap;}
  .weekday-chip{width:26px;height:26px;border-radius:50%;border:1.5px solid #D5D2D0;background:#FDFBFA;font-size:13px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s;color:#908D8B;}
  .weekday-chip:hover{border-color:#C4A882;color:#C4A882;}
  .weekday-chip.picked{background:#C4A882;border-color:#C4A882;color:#FDFBFA;}
  .extra-options .hint{font-size:12px;color:#C8C5C3;margin-left:2px;}
  /* Date nav */
  .date-nav{display:flex;align-items:center;justify-content:center;gap:5px;padding:8px 14px;background:#F5F3F0;border-bottom:1px solid #EBE8E6;flex-shrink:0;}
  .date-nav .nav-arrow{width:28px;height:28px;border:1.5px solid #D5D2D0;border-radius:50%;background:#FDFBFA;cursor:pointer;font-size:16px;color:#5C5957;display:flex;align-items:center;justify-content:center;transition:all .2s;flex-shrink:0;line-height:1;}
  .date-nav .nav-arrow:hover{border-color:#8E9AAF;color:#8E9AAF;background:#F0EEF4;}
  .date-nav .view-date-display{font-size:15px;font-weight:600;color:#2C2927;cursor:pointer;padding:3px 8px;border-radius:8px;transition:all .2s;min-width:140px;text-align:center;border:2px solid transparent;}
  .date-nav .view-date-display:hover{background:#EDEBF0;border-color:#8E9AAF;}
  .date-nav .view-date-display.other-date{color:#C4A882;}
  .date-nav .today-btn{padding:3px 10px;border:1.5px solid #D5D2D0;background:#FDFBFA;border-radius:10px;font-size:13px;cursor:pointer;color:#908D8B;transition:all .2s;white-space:nowrap;}
  .date-nav .today-btn:hover{border-color:#8E9AAF;color:#8E9AAF;background:#F0EEF4;}
  .date-nav .today-btn.hidden{display:none;}
  .date-nav input[type="date"]{position:absolute;opacity:0;pointer-events:none;width:0;}
  /* Filter */
  .filter-bar{display:flex;justify-content:space-between;align-items:center;padding:7px 14px;border-bottom:1px solid #EBE8E6;flex-wrap:wrap;gap:4px;flex-shrink:0;}
  .filter-group{display:flex;gap:4px;}
  .filter-btn{padding:3px 10px;border:none;background:#EBE9E7;border-radius:12px;font-size:13px;cursor:pointer;transition:all .2s;color:#908D8B;}
  .filter-btn.active{background:#8E9AAF;color:#FDFBFA;}
  /* Section headers */
  .section-header{padding:10px 14px 4px;font-size:13px;font-weight:600;color:#A8A5A3;text-transform:uppercase;letter-spacing:.4px;display:flex;align-items:center;gap:4px;}
  .section-header .badge{font-size:12px;padding:1px 6px;border-radius:7px;color:#FDFBFA;font-weight:500;}
  .badge.daily{background:#8B9E82;}.badge.weekly{background:#C4A882;}.badge.once{background:#8A9BAD;}
  /* Todo list */
  .todo-list{list-style:none;flex:1;overflow-y:auto;min-height:200px;max-height:560px;}
  .todo-list::-webkit-scrollbar{width:4px;}.todo-list::-webkit-scrollbar-thumb{background:#D5D2D0;border-radius:2px;}
  .todo-item{display:flex;flex-wrap:wrap;align-items:center;padding:8px 14px 5px;gap:0 8px;border-bottom:1px solid #F0EEED;transition:background .2s;animation:slideIn .25s;}
  @keyframes slideIn{from{opacity:0;transform:translateX(-14px)}to{opacity:1;transform:translateX(0)}}
  @keyframes bounceIn{0%{transform:scale(0)}60%{transform:scale(1.2)}100%{transform:scale(1)}}
  .todo-item:hover{background:#F7F6F5;}
  .todo-item.completed .todo-text{text-decoration:line-through;color:#C8C5C3;}
  /* Main row */
  .todo-main{display:flex;align-items:center;gap:8px;width:100%;}
  .check-box{width:20px;height:20px;border:2px solid #D5D2D0;border-radius:50%;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .2s;background:#FDFBFA;}
  .check-box:hover{border-color:#8E9AAF;}
  .todo-item.completed .check-box{background:#8E9AAF;border-color:#8E9AAF;animation:bounceIn .3s;}
  .check-box::after{content:'✓';color:#FDFBFA;font-size:14px;font-weight:700;opacity:0;transform:scale(0);transition:all .2s;}
  .todo-item.completed .check-box::after{opacity:1;transform:scale(1);}
  .todo-text{flex:1;font-size:16px;color:#2C2927;word-break:break-word;transition:color .2s;}
  .todo-tags{display:flex;gap:3px;flex-shrink:0;align-items:center;}
  .tag{font-size:12px;padding:2px 6px;border-radius:4px;font-weight:500;white-space:nowrap;}
  .tag.date-tag{background:#E8ECF0;color:#7A8B9D;}
  .tag.daily-tag{background:#E7ECE5;color:#7D9175;}
  .tag.weekly-tag{background:#F0EAE0;color:#B59570;}
  .tag.done-tag{background:#EDE4F0;color:#8E7B9A;}
  .tag.label-tag{font-size:12px;padding:2px 7px;border-radius:4px;color:#FDFBFA;}
  .delete-btn{width:24px;height:24px;border:none;background:transparent;border-radius:50%;cursor:pointer;font-size:15px;color:#C8C5C3;transition:all .2s;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
  .delete-btn:hover{background:#FAECEC;color:#C49090;}
  /* Sub row: label + timer */
  .todo-sub{display:flex;align-items:center;gap:6px;width:100%;padding:2px 0 5px 28px;}
  .label-select{font-size:13px;padding:3px 5px;border:1.5px solid #D5D2D0;border-radius:5px;outline:none;color:#5C5957;cursor:pointer;background:#FDFBFA;flex-shrink:0;max-width:80px;}
  .label-select:focus{border-color:#8E9AAF;}
  .timer-row{display:flex;align-items:center;gap:5px;}
  .timer-btn{width:24px;height:24px;border:1.5px solid #D5D2D0;background:#FDFBFA;border-radius:50%;cursor:pointer;font-size:14px;color:#908D8B;display:flex;align-items:center;justify-content:center;transition:all .2s;flex-shrink:0;}
  .timer-btn:hover{border-color:#8E9AAF;color:#8E9AAF;}
  .timer-btn.playing{background:#C49090;border-color:#C49090;color:#FDFBFA;animation:pulse 1.2s ease-in-out infinite;}
  @keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.08)}}
  .timer-display{font-size:14px;color:#5C5957;min-width:40px;text-align:center;font-variant-numeric:tabular-nums;}
  .timer-input{width:60px;padding:3px 4px;border:1.5px solid #D5D2D0;border-radius:4px;font-size:13px;text-align:center;outline:none;}
  .timer-input:focus{border-color:#8E9AAF;}
  /* Empty */
  .empty-state{text-align:center;padding:30px 16px;color:#C8C5C3;}
  .empty-state .icon{font-size:38px;}
  .empty-state p{font-size:14px;}
  /* Footer */
  .footer{display:flex;justify-content:space-between;align-items:center;padding:8px 14px;border-top:1px solid #EBE8E6;flex-shrink:0;}
  .footer button{background:none;border:none;color:#908D8B;font-size:14px;cursor:pointer;transition:color .2s;}
  .footer button:hover{color:#C49090;}
  /* Edit mode */
  .todo-item.editing .todo-text{display:none;}
  .todo-item .edit-input{display:none;}
  .todo-item.editing .edit-input{display:block;flex:1;padding:3px 5px;border:1.5px solid #8E9AAF;border-radius:5px;font-size:16px;outline:none;}
  .todo-item.editing .todo-sub,.todo-item.editing .todo-tags,.todo-item.editing .delete-btn{display:none;}
  /* Count lists */
  .count-list{list-style:none;flex:1;overflow-y:auto;min-height:90px;max-height:380px;}
  .count-list::-webkit-scrollbar{width:4px;}.count-list::-webkit-scrollbar-thumb{background:#D5D2D0;border-radius:2px;}
  .count-card{display:flex;align-items:center;padding:9px 14px;gap:8px;border-bottom:1px solid #F0EEED;transition:background .2s;animation:slideIn .25s;}
  .count-card:hover{background:#F7F6F5;}
  .count-card .days-col{display:flex;flex-direction:column;align-items:center;min-width:46px;flex-shrink:0;}
  .count-card .days-num{font-size:28px;font-weight:800;line-height:1;}
  .count-card .days-sub{font-size:12px;color:#A8A5A3;margin-top:1px;}
  .count-card .count-info{flex:1;min-width:0;}
  .count-card .count-text{font-size:15px;font-weight:600;color:#2C2927;word-break:break-word;}
  .count-card .count-date{font-size:13px;color:#908D8B;margin-top:1px;}
  .count-card .count-edit-input{display:none;}
  .count-card.editing .count-text{display:none;}
  .count-card.editing .count-edit-input{display:block;flex:1;padding:2px 4px;border:1.5px solid #8E9AAF;border-radius:4px;font-size:15px;font-weight:600;outline:none;color:#2C2927;}
  .count-card.editing .count-date,.count-card.editing .delete-btn{display:none;}
  /* Urgency */
  .count-card.urgent .days-num{color:#C49090;}.count-card.urgent .days-col{animation:pulse 1s ease-in-out infinite;}
  .count-card.soon .days-num{color:#C4A882;}.count-card.normal .days-num{color:#8B9E82;}
  .countup-card .days-num{color:#C49E9E;}
  /* Pie chart area (left column) */
  .pie-area{flex:1;display:flex;flex-direction:column;overflow-y:auto;}
  .pie-canvas-wrap{text-align:center;padding:12px 0 6px;flex-shrink:0;}
  .pie-canvas-wrap canvas{cursor:default;}
  .time-period-switch{display:flex;gap:3px;justify-content:center;padding:5px 10px;flex-shrink:0;}
  .tp-btn{padding:3px 10px;border:1.5px solid #D5D2D0;background:#FDFBFA;border-radius:12px;font-size:13px;cursor:pointer;color:#908D8B;transition:all .2s;}
  .tp-btn:hover{border-color:#8E9AAF;color:#8E9AAF;}
  .tp-btn.active{background:#8E9AAF;color:#FDFBFA;border-color:#8E9AAF;}
  .pie-legend{padding:5px 14px 10px;flex-shrink:0;}
  .pie-legend-item{display:flex;align-items:center;flex-wrap:wrap;gap:5px;font-size:13px;color:#5C5957;padding:3px 0;}
  .pie-legend-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;}
  .pie-legend-name{flex:1;}
  .pie-legend-time{font-weight:600;color:#2C2927;}
  .pie-subs{display:none;width:100%;padding-left:16px;margin-top:1px;}
  .pie-legend-group.expanded .pie-subs{display:block;}
  .pie-legend-group{cursor:pointer;}
  .pie-legend-group .pie-legend-name{font-weight:600;}
  .pie-sub-item{display:flex;justify-content:space-between;font-size:12px;color:#908D8B;padding:1px 0;}
  .pie-sub-time{font-weight:500;color:#5C5957;}
  .pie-legend-group .pie-legend-time{color:#8E9AAF;}
  .no-data-hint{text-align:center;font-size:13px;color:#C8C5C3;padding:24px 8px;}
  /* Label management */
  .label-mgr{padding:8px 14px;border-top:1px solid #EBE8E6;flex-shrink:0;}
  .color-swatches{display:none;flex-wrap:wrap;gap:5px;align-items:center;}
  .color-swatches.open{display:flex;}
  .color-swatch{width:22px;height:22px;border-radius:50%;cursor:pointer;border:2px solid transparent;transition:all .15s;flex-shrink:0;}
  .color-swatch:hover{transform:scale(1.2);}
  .color-swatch.selected{border-color:#2C2927;box-shadow:0 0 0 2px #fff,0 0 0 4px #2C2927;transform:scale(1.15);}
  .color-swatch.used{opacity:.25;cursor:not-allowed;}
  .color-swatch.used:hover{transform:none;}
  .color-pick-trigger{width:28px;height:28px;border-radius:50%;cursor:pointer;border:2px solid #D5D2D0;flex-shrink:0;transition:all .15s;position:relative;}
  .color-pick-trigger:hover{border-color:#8E9AAF;transform:scale(1.1);}
  .color-pick-trigger::after{content:'▾';position:absolute;bottom:-4px;right:-4px;font-size:10px;background:#FDFBFA;border-radius:50%;width:15px;height:15px;display:flex;align-items:center;justify-content:center;color:#908D8B;line-height:1;box-shadow:0 1px 2px rgba(0,0,0,.1);}
  .color-custom-btn{width:22px;height:22px;border-radius:50%;cursor:pointer;border:2px dashed #C8C5C3;background:#FDFBFA;font-size:14px;color:#C8C5C3;display:flex;align-items:center;justify-content:center;transition:all .15s;flex-shrink:0;line-height:1;}
  .color-custom-btn:hover{border-color:#8E9AAF;color:#8E9AAF;}
  #colorPickerHidden{position:absolute;opacity:0;pointer-events:none;width:0;height:0;}
  .label-mgr-row{display:flex;gap:4px;margin-bottom:5px;}
  .label-mgr-row input{flex:1;padding:4px 7px;border:1.5px solid #D5D2D0;border-radius:5px;font-size:13px;outline:none;}
  .label-mgr-row input:focus{border-color:#8E9AAF;}
  .label-mgr-row button{padding:4px 12px;border:1.5px solid #8E9AAF;background:#8E9AAF;color:#FDFBFA;border-radius:5px;font-size:13px;cursor:pointer;white-space:nowrap;}
  .label-mgr-row button:hover{opacity:.9;}
  .existing-labels{display:flex;flex-wrap:wrap;gap:4px;}
  .existing-label{font-size:12px;padding:2px 7px;border-radius:8px;color:#FDFBFA;cursor:pointer;display:flex;align-items:center;gap:3px;}
  .existing-label .del-label{margin-left:2px;font-weight:700;opacity:.7;}
  .existing-label .del-label:hover{opacity:1;}
  .existing-label.dragging{opacity:.4;transform:scale(.95);}
  .existing-label.drag-over{border:2px dashed #8E9AAF;border-radius:8px;transform:scale(1.05);}
  .existing-label[draggable="true"]{cursor:grab;}
  .existing-label[draggable="true"]:active{cursor:grabbing;}
  .preset-btns{margin-top:4px;display:flex;gap:4px;}
  .preset-btn{padding:2px 8px;border:1.5px solid #D5D2D0;background:#FDFBFA;border-radius:8px;font-size:10px;cursor:pointer;color:#908D8B;transition:all .2s;white-space:nowrap;}
  .preset-btn:hover{border-color:#8E9AAF;color:#8E9AAF;}
  #presetFileInput{display:none;}
  /* File area */
  .file-area{display:flex;align-items:center;justify-content:space-between;padding:7px 16px;border-top:1px solid #EBE8E6;background:#F7F6F5;gap:4px;flex-wrap:wrap;}
  .file-area .storage-indicator{font-size:12px;color:#A8A5A3;display:flex;align-items:center;gap:3px;}
  .file-area .storage-indicator.file-mode{color:#8B9E82;}
  .file-area .file-btns{display:flex;gap:4px;}
  .file-btn{padding:3px 10px;border:1.5px solid #D5D2D0;background:#FDFBFA;border-radius:12px;font-size:13px;cursor:pointer;transition:all .2s;color:#5C5957;white-space:nowrap;}
  .file-btn:hover{border-color:#8E9AAF;color:#8E9AAF;background:#F0EEF4;}
  #fileInput{display:none;}
  .toast{position:fixed;top:20px;left:50%;transform:translateX(-50%);background:#2C2927;color:#FDFBFA;padding:10px 24px;border-radius:20px;font-size:16px;z-index:999;animation:toastIn .3s ease,toastOut .3s ease 1.5s forwards;pointer-events:none;}
  @keyframes toastIn{from{opacity:0;transform:translateX(-50%) translateY(-20px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}
  @keyframes toastOut{from{opacity:1}to{opacity:0}}

  /* ===== 只读模式视觉效果 ===== */
  .readonly-mode .check-box,
  .readonly-mode .delete-btn,
  .readonly-mode .timer-btn,
  .readonly-mode .timer-input,
  .readonly-mode .label-select,
  .readonly-mode .existing-label,
  .readonly-mode .todo-item,
  .readonly-mode .count-card,
  .readonly-mode .file-btn,
  .readonly-mode .preset-btn,
  .readonly-mode .footer button,
  .readonly-mode .color-swatch,
  .readonly-mode .color-custom-btn,
  .readonly-mode .color-pick-trigger{opacity:0.4;filter:grayscale(60%);cursor:not-allowed;}

  /* ===== Login Overlay ===== */
  .login-overlay{
    position:fixed;top:0;left:0;width:100%;height:100%;
    background:linear-gradient(135deg,#8E9AAF,#8E7B8C);
    display:flex;align-items:center;justify-content:center;z-index:1000;
  }
  .login-card{
    background:#FDFBFA;border-radius:16px;padding:36px 32px;
    width:100%;max-width:380px;box-shadow:0 20px 60px rgba(0,0,0,.2);text-align:center;
  }
  .login-card h2{font-size:22px;color:#2C2927;margin-bottom:6px;}
  .login-card .login-sub{font-size:13px;color:#908D8B;margin-bottom:20px;}

<script>
// =================== 工具函数 ===================
const WDAY=['日','一','二','三','四','五','六'];
function dStr(d){return`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;}
function realToday(){return dStr(new Date());}
function fmtDate(s){if(!s)return'';const[a,b,c]=s.split('-');return`${Number(b)}月${Number(c)}日`;}
function daysBetween(d1,d2){return Math.round((new Date(d2+'T00:00:00')-new Date(d1+'T00:00:00'))/86400000);}
function escHtml(s){const d=document.createElement('div');d.textContent=s;return d.innerHTML;}
function escAttr(s){return s.replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function fmtDuration(sec){
  const neg=sec<0;sec=Math.abs(Math.round(sec));
  const h=Math.floor(sec/3600),m=Math.floor(sec%3600/60),s=sec%60;
  let r=neg?'-':'';
  if(h>0)r+=`${h}h${m}m${String(s).padStart(2,'0')}s`;
  else if(m>0)r+=`${m}分${String(s).padStart(2,'0')}秒`;
  else r+=`${s}秒`;
  return r;
}

// =================== 数据存储 ===================
const SK='my_plan_list_v2';
function loadList(k){try{const r=localStorage.getItem(k);return r?JSON.parse(r):[];}catch{return[];}}
function saveList(k,v){localStorage.setItem(k,JSON.stringify(v));}
let todos=loadList(SK);

// =================== 标签 ===================
const DEF_LABELS=[{id:1,name:'数学',color:'#8B9E82'},{id:2,name:'英语',color:'#C49E9E'},{id:3,name:'编程',color:'#8A9BAD'},{id:4,name:'阅读',color:'#C4A882'}];
function freshLabelId(){return Math.max(0,...labels.map(l=>l.id||0))+1;}

function loadLabels(){
  try{const r=localStorage.getItem('my_labels');if(r){const arr=JSON.parse(r);for(const l of arr){if(!l.id)l.id=freshLabelId();}return arr;}}catch{}
  return DEF_LABELS.map(l=>({...l}));
}
function saveLabels(){localStorage.setItem('my_labels',JSON.stringify(labels));}
let labels=loadLabels();

function labelById(id){return labels.find(l=>l.id===id)||labels.find(l=>l.name===String(id));}
function labelNameById(id){const l=labelById(id);return l?l.name:(id||'');}
function labelDisplay(id){
  const l=labelById(id);if(!l)return id||'';
  if(l.parent){const p=labels.find(x=>x.id===l.parent);if(p)return p.name+' → '+l.name;}
  return l.name;
}
function getLabelColor(id){
  const l=labelById(id);if(!l)return'#908D8B';
  if(l.parent){const p=labels.find(x=>x.id===l.parent);return p?p.color:l.color;}
  return l.color;
}

// =================== 计时（_timer_state 仅存 startTime，恢复时算差值，上限 4h） ===================
let activeTimer=null, tickInterval=null;

function startTimer(id){
  if(activeTimer){stopTimer();}
  activeTimer={todoId:id,startTime:Date.now()};
  _writeTimerFile();
  if(!tickInterval){tickInterval=setInterval(tick,1000);}
}

function _writeTimerFile(){
  if(!activeTimer)return;
  localStorage.setItem('_timer_state',JSON.stringify({todoId:activeTimer.todoId,startTime:activeTimer.startTime}));
}

function _readTimerFile(){
  try{const r=localStorage.getItem('_timer_state');return r?JSON.parse(r):null;}catch(e){return null;}
}

function stopTimer(){
  if(!activeTimer)return;
  _syncTimerToLogs();
  activeTimer=null;clearInterval(tickInterval);tickInterval=null;
  const btn=todoList.querySelector('.timer-btn.playing');if(btn)btn.classList.remove('playing');
  localStorage.removeItem('_timer_state');
  saveTodos();renderTodo();renderPie();
}

function pauseTimer(){
  stopTimer(); // same: sync to logs, clear state
}

function _syncTimerToLogs(){
  if(!activeTimer)return;
  const elapsed=Math.floor((Date.now()-activeTimer.startTime)/1000);
  if(elapsed<=0)return;
  const t=todos.find(x=>x.id===activeTimer.todoId);
  if(!t)return;
  if(!t.timeLogs)t.timeLogs=[];
  const today=realToday();
  const existing=t.timeLogs.filter(l=>l.date===today).reduce((s,l)=>s+l.seconds,0);
  t.timeLogs=t.timeLogs.filter(l=>l.date!==today);
  t.timeLogs.push({date:today,seconds:existing+elapsed});
}

function tick(){
  if(!activeTimer)return;
  const t=todos.find(x=>x.id===activeTimer.todoId);
  if(!t){stopTimer();return;}
  let base=0;const today=realToday();
  if(t.timeLogs){for(const l of t.timeLogs){if(l.date===today)base+=l.seconds;}}
  const running=isViewingToday()?Math.floor((Date.now()-activeTimer.startTime)/1000):0;
  const sec=base+running;
  const el=todoList.querySelector(`[data-id="${activeTimer.todoId}"] .timer-display`);
  if(el)el.textContent=fmtDuration(sec);
  // 每 5 秒刷新 startTime 到 localStorage（防止崩溃丢大量时间）
  _hbTick=(_hbTick||0)+1;
  if(_hbTick%5===0){_writeTimerFile();}
}
let _hbTick=0;

function addManualTime(id,seconds){
  if(seconds<0)return;
  const t=todos.find(x=>x.id===id);if(!t)return;
  if(!t.timeLogs)t.timeLogs=[];
  // 为当前查看的日期设定时长
  const viewDay=getViewStr();
  t.timeLogs=t.timeLogs.filter(l=>l.date!==viewDay);
  if(seconds>0)t.timeLogs.push({date:viewDay,seconds});
  saveTodos();renderPie();renderTodo();
}

// =================== 页面隐藏/关闭时自动保存计时 ===================
window.addEventListener('visibilitychange',()=>{
  if(document.visibilityState==='hidden'&&activeTimer){_writeTimerFile();}
});
window.addEventListener('beforeunload',()=>{
  if(activeTimer){_syncTimerToLogs();}
});


// =================== 视图日期 ===================
let viewDate=new Date();viewDate.setHours(0,0,0,0);
function getViewStr(){return dStr(viewDate);}
function getViewDOW(){return viewDate.getDay();}
function isViewingToday(){return getViewStr()===realToday();}
function fmtViewCN(){const v=viewDate;return`${v.getFullYear()}年${v.getMonth()+1}月${v.getDate()}日 星期${WDAY[v.getDay()]}`;}
function setViewDate(d){viewDate=new Date(d);viewDate.setHours(0,0,0,0);updateViewDateUI();renderTodo();renderPie();}
function goPrevDay(){const d=new Date(viewDate);d.setDate(d.getDate()-1);setViewDate(d);}
function goNextDay(){const d=new Date(viewDate);d.setDate(d.getDate()+1);setViewDate(d);}
function goToday(){setViewDate(new Date());}

function updateViewDateUI(){
  const vStr=getViewStr(),rToday=realToday();
  const D=document.getElementById('viewDateDisplay');
  const B=document.getElementById('backTodayBtn');
  const P=document.getElementById('viewDatePicker');
  D.textContent=fmtViewCN();P.value=vStr;
  if(isViewingToday()){D.classList.remove('other-date');B.classList.add('hidden');}
  else{D.classList.add('other-date');B.classList.remove('hidden');}
  document.querySelector('.col-center .input-area').classList.toggle('locked',vStr<rToday);
  dateDisplay.textContent=vStr<rToday?'🔒 '+fmtViewCN()+'（只读）':'📅 查看：'+fmtViewCN();
}

// =================== 饼图 ===================
let timePeriod='today';
function getWeekStart(d){
  const dt=new Date(d);const day=dt.getDay();const diff=dt.getDate()-day+(day===0?-6:1);
  return dStr(new Date(dt.setDate(diff)));
}
function getMonthStart(){return`${new Date().getFullYear()}-${String(new Date().getMonth()+1).padStart(2,'0')}-01`;}

function getWeekEnd(d){
  const dt=new Date(d);const day=dt.getDay();const end=dt.getDate()+(day===0?0:7-day);
  return dStr(new Date(dt.setDate(end)));
}
function getMonthEnd(){return`${viewDate.getFullYear()}-${String(viewDate.getMonth()+1).padStart(2,'0')}-${new Date(viewDate.getFullYear(),viewDate.getMonth()+1,0).getDate()}`;}

function filterLogsByPeriod(logs){
  const ref=getViewStr();
  const refDate=new Date(viewDate.getTime());
  return logs.filter(l=>{
    if(timePeriod==='today')return l.date===ref;
    if(timePeriod==='week'){const ws=getWeekStart(refDate);const we=getWeekEnd(refDate);return l.date>=ws&&l.date<=we;}
    if(timePeriod==='month'){const ms=`${viewDate.getFullYear()}-${String(viewDate.getMonth()+1).padStart(2,'0')}-01`;const me=getMonthEnd();return l.date>=ms&&l.date<=me;}
    return true;
  });
}

function calcLabelTimes(){
  // Aggregate per-label seconds by label ID
  const raw={};
  for(const lb of labels)raw[lb.id]=0;
  for(const t of todos){
    const lid=t.label||0;if(!lid)continue;
    if(!(lid in raw))raw[lid]=0;
    if(!t.timeLogs)continue;
    const filtered=filterLogsByPeriod(t.timeLogs);
    let total=0;for(const l of filtered)total+=l.seconds;
    raw[lid]+=total;
  }
  if(activeTimer){
    const t=todos.find(x=>x.id===activeTimer.todoId);
    if(t&&t.label&&(t.label in raw)){
      const now=realToday(),ref=getViewStr();
      const sec=Math.floor((Date.now()-activeTimer.startTime)/1000);
      if(timePeriod==='today'&&now===ref)raw[t.label]+=sec;
      else if(timePeriod==='week'){
        const ws=getWeekStart(new Date(viewDate.getTime()));
        const we=getWeekEnd(new Date(viewDate.getTime()));
        if(now>=ws&&now<=we)raw[t.label]+=sec;
      }else if(timePeriod==='month'){
        const ms=`${viewDate.getFullYear()}-${String(viewDate.getMonth()+1).padStart(2,'0')}-01`;
        const me=getMonthEnd();
        if(now>=ms&&now<=me)raw[t.label]+=sec;
      }else if(timePeriod==='all')raw[t.label]+=sec;
    }
  }

  // Build map: top-level labels aggregate their children
  const map={};
  for(const lb of labels){
    if(!lb.parent){map[lb.id]={total:0,subs:{},name:lb.name,color:lb.color};}
  }
  for(const lb of labels){
    const sec=raw[lb.id]||0;
    if(lb.parent&&map[lb.parent]){
      map[lb.parent].total+=sec;
      map[lb.parent].subs[lb.id]={name:lb.name,sec};
    }else if(!lb.parent&&map[lb.id]){
      map[lb.id].total+=sec;
    }
  }
  return map;
}

const PRESET_COLORS=['#8B9E82','#C49E9E','#8A9BAD','#C4A882','#9E8BA0','#8EA8A0','#C49090','#8E9BA0','#A09088','#A0A88E','#8E8EA8','#8EA090','#C8C088','#B89A90','#8EA88E','#8AA0A8','#B090B8','#C09880','#889AA0','#8EAA88'];

function nextUnusedColor(){
  const used=new Set(labels.map(l=>l.color));
  for(const c of PRESET_COLORS){if(!used.has(c))return c;}
  // 随机生成一个不太可能重复的
  const h=Math.floor(Math.random()*360);
  const s=40+Math.floor(Math.random()*30);
  const l=35+Math.floor(Math.random()*25);
  return`hsl(${h},${s}%,${l}%)`;
}

const COLORS10=PRESET_COLORS;

function renderPie(){
  const map=calcLabelTimes();
  const entries=Object.entries(map).filter(([,v])=>v.total>0).sort((a,b)=>b[1].total-a[1].total);
  const total=entries.reduce((s,[,v])=>s+v.total,0);

  const legend=document.getElementById('pieLegend');
  const c=document.getElementById('pieCanvas'),ctx=c.getContext('2d');
  const cx=c.width/2,cy=c.height/2,rinner=42,router=80;
  ctx.clearRect(0,0,c.width,c.height);

  if(entries.length===0){
    legend.innerHTML='<div class="no-data-hint">暂无学习记录</div>';
    ctx.fillStyle='#EBE8E6';ctx.beginPath();ctx.arc(cx,cy,router,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#C8C5C3';ctx.font='14px sans-serif';ctx.textAlign='center';
    ctx.fillText('暂无数据',cx,cy+5);
    pieSliceData=[];return;
  }

  // Store slice data for hover
  const slices=[];
  let angle=-Math.PI/2;
  for(let i=0;i<entries.length;i++){
    const [id,data]=entries[i];
    const slice=Math.max(data.total/total*Math.PI*2,0.04);
    const color=COLORS10[i%COLORS10.length];
    ctx.beginPath();ctx.moveTo(cx,cy);
    ctx.arc(cx,cy,router,angle,angle+slice);
    ctx.closePath();
    ctx.fillStyle=color;ctx.fill();
    ctx.strokeStyle='#fff';ctx.lineWidth=1.5;ctx.stroke();
    slices.push({name:data.name,data,color,startAngle:angle,endAngle:angle+slice});
    angle+=slice;
  }

  // Center hole + total text
  ctx.beginPath();ctx.arc(cx,cy,rinner,0,Math.PI*2);ctx.fillStyle='#fff';ctx.fill();
  ctx.fillStyle='#2C2927';ctx.font='bold 13px sans-serif';ctx.textAlign='center';
  ctx.fillText(fmtDuration(total),cx,cy+4);

  // Draw label names
  for(const s of slices){
    const mid=(s.startAngle+s.endAngle)/2;
    const pct=s.data.total/total;
    const name=s.name;
    ctx.save();
    // Try inside first if slice > 15%
    if(pct>0.15&&name.length<=4){
      const ir=router-(router-rinner)*0.5;
      const tx=cx+Math.cos(mid)*ir,ty=cy+Math.sin(mid)*ir;
      ctx.fillStyle='#fff';ctx.font='bold 12px sans-serif';ctx.textAlign='center';ctx.textBaseline='middle';
      ctx.fillText(name,tx,ty);
    }else{
      // Outside with line
      const or=router+12;
      const tx=cx+Math.cos(mid)*or,ty=cy+Math.sin(mid)*or;
      const isLeft=tx<cx;
      ctx.fillStyle='#2C2927';ctx.font='11px sans-serif';
      ctx.textAlign=isLeft?'right':'left';ctx.textBaseline='middle';
      ctx.fillText(name,tx,ty);
      // Short connector line
      const lx1=cx+Math.cos(mid)*router,ly1=cy+Math.sin(mid)*router;
      const lx2=cx+Math.cos(mid)*(router+4),ly2=cy+Math.sin(mid)*(router+4);
      ctx.beginPath();ctx.moveTo(lx1,ly1);ctx.lineTo(lx2,ly2);ctx.lineTo(tx,ty);
      ctx.strokeStyle='#908D8B';ctx.lineWidth=1;ctx.stroke();
    }
    ctx.restore();
  }

  // Legend
  let lh='',colorIdx2=0;
  for(let i=0;i<entries.length;i++){
    const[id,data]=entries[i];
    const subEntries=Object.entries(data.subs).filter(([,v])=>v.sec>0);
    const color=COLORS10[colorIdx2%COLORS10.length];
    if(subEntries.length>0){
      const subHtml=subEntries.map(([sid,sv])=>`<div class="pie-sub-item">↳ ${escHtml(sv.name)} <span class="pie-sub-time">${fmtDuration(sv.sec)}</span></div>`).join('');
      lh+=`<div class="pie-legend-item pie-legend-group">
        <span class="pie-legend-dot" style="background:${color}"></span>
        <span class="pie-legend-name">${escHtml(data.name)}</span>
        <span class="pie-legend-time">${fmtDuration(data.total)} ▸</span>
        <div class="pie-subs">${subHtml}</div>
      </div>`;
    }else{
      lh+=`<div class="pie-legend-item">
        <span class="pie-legend-dot" style="background:${color}"></span>
        <span class="pie-legend-name">${escHtml(data.name)}</span>
        <span class="pie-legend-time">${fmtDuration(data.total)}</span>
      </div>`;
    }
    colorIdx2++;
  }
  legend.innerHTML=lh;

  legend.querySelectorAll('.pie-legend-group').forEach(g=>{
    g.addEventListener('click',e=>{e.stopPropagation();g.classList.toggle('expanded');});
  });

  // Hover on canvas: show tooltip
  window._pieSlices=slices;
  window._pieEntries=entries;
}

// Canvas hover
const pieTooltip=document.getElementById('pieTooltip');
document.getElementById('pieCanvas').addEventListener('mousemove',e=>{
  const slices=window._pieSlices;
  if(!slices||!slices.length){pieTooltip.style.display='none';return;}
  const rect=e.target.getBoundingClientRect();
  const cx=rect.width/2,cy=rect.height/2;
  const x=e.clientX-rect.left-cx,y=e.clientY-rect.top-cy;
  const dist=Math.sqrt(x*x+y*y);
  let angle=Math.atan2(y,x);if(angle<-Math.PI/2)angle+=Math.PI*2;
  let hit=null;
  for(const s of slices){
    let sa=s.startAngle,sb=s.endAngle;
    if(sa<-Math.PI/2)sa+=Math.PI*2;if(sb<-Math.PI/2)sb+=Math.PI*2;
    if(angle>=sa&&angle<=sb&&dist<=80&&dist>=42){hit=s;break;}
    if(sa>sb){if((angle>=sa||angle<=sb)&&dist<=80&&dist>=42){hit=s;break;}}
  }
  if(hit){
    const subs=Object.entries(hit.data.subs).filter(([,v])=>v.sec>0);
    let tip=`<b>${escHtml(hit.name)}</b> ${fmtDuration(hit.data.total)}`;
    if(subs.length>0)tip+='<br>'+subs.map(([k,v])=>`↳ ${escHtml(v.name)} ${fmtDuration(v.sec)}`).join('<br>');
    pieTooltip.innerHTML=tip;
    pieTooltip.style.display='block';pieTooltip.style.left=(e.clientX+12)+'px';pieTooltip.style.top=(e.clientY-10)+'px';
  }else{
    pieTooltip.style.display='none';
  }
});

function getParentLabel(id){
  const child=labelById(id);if(!child||!child.parent)return null;
  return labelById(child.parent);
}
function isTopLabel(lb){return!lb.parent;}
function getChildren(pid){return labels.filter(l=>l.parent===pid);}

function renderLabels(){
  const tops=labels.filter(isTopLabel);
  let parentHTML='<option value="">顶层标签</option>';
  for(const tl of tops){
    const kids=labels.filter(l=>l.parent===tl.id);
    if(kids.length>0){
      parentHTML+=`<optgroup label="${escAttr(tl.name)}">`;
      parentHTML+=`<option value="${tl.id}">📁 ${escHtml(tl.name)}</option>`;
      for(const k of kids)parentHTML+=`<option value="${k.id}">↳ ${escHtml(k.name)}</option>`;
      parentHTML+=`</optgroup>`;
    }else{
      parentHTML+=`<option value="${tl.id}">${escHtml(tl.name)}</option>`;
    }
  }
  parentHTML+='<option value="__custom__">其他…</option>';
  labelParent.innerHTML=parentHTML;

  // Sort: top labels first, then their children
  const sorted=[];
  for(const lb of labels){
    if(!lb.parent){sorted.push(lb);
      for(const ch of labels){if(ch.parent===lb.id)sorted.push(ch);}
    }
  }
  for(const lb of labels){if(!sorted.includes(lb))sorted.push(lb);}

  let h='';
  for(const lb of sorted){
    const isChild=lb.parent&&labels.some(p=>p.id===lb.parent);
    const color=isChild?(getParentLabel(lb.id)||lb).color:lb.color;
    const prefix=isChild?'↳ ':'';
    h+=`<span class="existing-label${isChild?' is-child':''}" style="background:${color}" title="双击改名 | 拖动排序" draggable="true" data-id="${lb.id}" data-parent="${lb.parent||''}">
      <span>${prefix}${escHtml(lb.name)}</span><span class="del-label" data-del-id="${lb.id}">×</span>
    </span>`;
  }
  existingLabels.innerHTML=h;
}
existingLabels.addEventListener('click',e=>{
  const del=e.target.closest('[data-del-id]');
  if(!del)return;
  e.stopPropagation();
  const id=Number(del.dataset.delId);
  const lb=labelById(id);if(!lb)return;
  if(!confirm(`删除标签"${lb.name}"？\n已有事项的标签不会受影响。`))return;
  labels=labels.filter(l=>l.id!==id);
  // Clear parent ref from children
  for(const ch of labels){if(ch.parent===id)ch.parent=null;}
  // Clear todos using this label
  for(const t of todos){if(t.label===id)t.label=0;}
  saveLabels();renderLabels();renderColorSwatches();renderPie();renderTodo();
});
// Double-click to rename
existingLabels.addEventListener('dblclick',e=>{

  if(labels.find(l=>l.name===newName&&l.parent===lb.parent&&l.id!==id)){alert('此父标签下已存在同名标签');return;}
  lb.name=newName;

});

// === Drag & drop to reorder labels (top-level & children) ===
let dragSrcId=null;
existingLabels.addEventListener('dragstart',e=>{
  const label=e.target.closest('.existing-label');
  if(!label||e.target.closest('[data-del-id]')){e.preventDefault();return;}
  dragSrcId=Number(label.dataset.id);
  label.classList.add('dragging');
  e.dataTransfer.effectAllowed='move';
  e.dataTransfer.setData('text/plain','');
});
existingLabels.addEventListener('dragend',e=>{
  document.querySelectorAll('.existing-label').forEach(l=>{l.classList.remove('dragging','drag-over');});
  dragSrcId=null;
});
existingLabels.addEventListener('dragover',e=>{
  e.preventDefault();
  const target=e.target.closest('.existing-label');
  if(!target||Number(target.dataset.id)===dragSrcId||target.classList.contains('dragging'))return;
  // Only allow drops between siblings (same parent)
  const src=labelById(dragSrcId);if(!src)return;
  const tgt=labelById(Number(target.dataset.id));if(!tgt)return;
  if(src.parent!==tgt.parent)return; // must be same parent
  document.querySelectorAll('.existing-label').forEach(l=>l.classList.remove('drag-over'));
  target.classList.add('drag-over');
  e.dataTransfer.dropEffect='move';
});
existingLabels.addEventListener('drop',e=>{
  e.preventDefault();
  document.querySelectorAll('.existing-label').forEach(l=>l.classList.remove('drag-over'));
  const target=e.target.closest('.existing-label');
  if(!target||!dragSrcId||Number(target.dataset.id)===dragSrcId){dragSrcId=null;return;}
  const srcId=dragSrcId;const tgtId=Number(target.dataset.id);
  const src=labelById(srcId);const tgt=labelById(tgtId);
  if(!src||!tgt||src.parent!==tgt.parent){dragSrcId=null;return;}
  // If source has children, move source + children as a block
  const idsToMove=new Set([src.id]);
  if(!src.parent){for(const ch of labels){if(ch.parent===src.id)idsToMove.add(ch.id);}}
  const moved=labels.filter(l=>idsToMove.has(l.id));
  labels=labels.filter(l=>!idsToMove.has(l.id));
  const newIdx=labels.findIndex(l=>l.id===tgtId);
  labels.splice(newIdx,0,...moved);
  saveLabels();renderLabels();renderColorSwatches();renderPie();renderTodo();
  dragSrcId=null;
});

presetFileInput.addEventListener('change',()=>{
  const f=presetFileInput.files[0];if(!f)return;
  const r=new FileReader();
  r.onload=e=>{
    try{
      const preset=JSON.parse(e.target.result);
      if(!preset.labels||!Array.isArray(preset.labels))throw new Error('格式不正确');
      const total=preset.labels.length;
      if(!confirm(`导入"${preset.name||'未命名'}"预设 (${total}个标签)？\n\n"确定"覆盖当前标签\n"取消"合并`)){
        // Merge: build complete ID map, then add only missing labels
        const idMap={};let nextId=freshLabelId();
        for(const pl of preset.labels){
          const exist=labels.find(l=>l.name===pl.name&&l.parent===pl.parent);
          if(exist){idMap[pl.id]=exist.id;}// existing label, use its ID
          else{const nid=nextId++;idMap[pl.id]=nid;}// new label, assign fresh ID
        }
        for(const pl of preset.labels){
          const exist=labels.find(l=>l.name===pl.name&&l.parent===pl.parent);
          if(exist)continue;// already exists, skip
          const nl={...pl,id:idMap[pl.id],parent:pl.parent?idMap[pl.parent]:null};
          labels.push(nl);
        }
        showToast(`✅ 已合并 ${Object.keys(idMap).length} 个标签`);
      }else{
        labels=preset.labels.map(l=>({...l}));
        showToast(`✅ 已覆盖导入 ${labels.length} 个标签`);
      }
      saveLabels();renderLabels();renderColorSwatches();renderPie();renderTodo();
    }catch(err){showToast('❌ 预设文件格式错误');console.error(err);}
  };
  r.readAsText(f);presetFileInput.value='';
});

function addNewLabel(){

}

let currentTypeFilter='all',currentStatusFilter='all',currentTaskType='once';
let pickedWeekDays=new Set();

function isTaskForDate(t){
  const vStr=getViewStr(),vDOW=getViewDOW();
  if(t.skipDates&&t.skipDates.includes(vStr))return false;
  if(t.type==='daily'){if(t.createdDate&&vStr<t.createdDate)return false;return true;}
  if(t.type==='weekly'){if(t.createdDate&&vStr<t.createdDate)return false;return(t.weekDays||[]).includes(vDOW);}
  if(t.type==='once')return t.date===vStr;
  return false;
}
function isTaskDoneOnDate(t){
  const vStr=getViewStr();
  if(t.type==='once')return t.done;
  return t.done&&t.doneDate===vStr;
}
function getViewDateTasks(){
  const tasks=[];
  for(const t of todos){
    if(!isTaskForDate(t))continue;
    tasks.push(t);
  }
  tasks.sort((a,b)=>{if(a.done!==b.done)return a.done?1:-1;const o={daily:0,weekly:1,once:2};return(o[a.type]||0)-(o[b.type]||0);});
  return tasks;
}

function renderTodo(){
  let tasks=getViewDateTasks();
  if(currentTypeFilter!=='all')tasks=tasks.filter(t=>t.type===currentTypeFilter);
  if(currentStatusFilter==='active')tasks=tasks.filter(t=>!isTaskDoneOnDate(t));
  else if(currentStatusFilter==='completed')tasks=tasks.filter(t=>isTaskDoneOnDate(t));

  todoCount.textContent=getViewDateTasks().length;

  if(tasks.length===0){
    todoList.innerHTML=`<li class="empty-state"><div class="icon">${currentStatusFilter==='completed'?'🎉':'📝'}</div><p>${currentStatusFilter==='completed'?'还没有完成的事项':'这一天还没有事项'}</p></li>`;
  }else{
    const groups={daily:[],weekly:[],once:[]};
    for(const t of tasks)groups[t.type].push(t);
    const L={daily:{icon:'🔄',name:'每日必做',cls:'daily'},weekly:{icon:'📅',name:'本周重复',cls:'weekly'},once:{icon:'📍',name:'一次性任务',cls:'once'}};
    let h='';
    for(const[type,items]of Object.entries(groups)){
      if(items.length===0)continue;const lb=L[type];
      h+=`<li class="section-header">${lb.icon} ${lb.name}<span class="badge ${lb.cls}">${items.length}</span></li>`;
      for(const t of items){
        const done=isTaskDoneOnDate(t);
        const tags=buildTags(t,done);
        const ed=editingId===t.id?' editing':'';
        const dT=t.type==='once'?'永久删除':'单击跳过当天 | 双击永久删除';
        const dI=t.type==='once'?'✕':'⏭';
        const isPlaying=activeTimer&&activeTimer.todoId===t.id;
        const isRealToday=isViewingToday();
        // 正在计时只在实际今天有效
        const runningSec=(isPlaying&&isRealToday)?Math.floor((Date.now()-activeTimer.startTime)/1000):0;
        // 显示当前查看日期的累计时长
        let viewTotal=0;const viewDay=getViewStr();
        if(t.timeLogs){for(const l of t.timeLogs){if(l.date===viewDay)viewTotal+=l.seconds;}}
        const displaySec=viewTotal+runningSec;

        // Label selector (hierarchical: optgroups)
        let labelOpts='<option value="">--</option>';
        const topLabels=labels.filter(l=>!l.parent);
        const ungrouped=new Set(labels.map(l=>l.id));
        for(const tl of topLabels){
          const kids=labels.filter(l=>l.parent===tl.id);
          kids.forEach(k=>ungrouped.delete(k.id));
          ungrouped.delete(tl.id);
          if(kids.length>0){
            labelOpts+=`<optgroup label="${escAttr(tl.name)}">`;
            labelOpts+=`<option value="${tl.id}"${t.label===tl.id?' selected':''}>📁 ${escHtml(tl.name)}</option>`;
            for(const k of kids){
              labelOpts+=`<option value="${k.id}"${t.label===k.id?' selected':''}>↳ ${escHtml(k.name)}</option>`;
            }
            labelOpts+=`</optgroup>`;
          }else{
            labelOpts+=`<option value="${tl.id}"${t.label===tl.id?' selected':''}>${escHtml(tl.name)}</option>`;
          }
        }
        for(const lb of labels){if(ungrouped.has(lb.id))labelOpts+=`<option value="${lb.id}"${t.label===lb.id?' selected':''}>${escHtml(lb.name)}</option>`;}

        h+=`<li class="todo-item${done?' completed':''}${ed}" data-id="${t.id}">
          <div class="todo-main">
            <div class="check-box" data-action="toggle"></div>
            <span class="todo-text">${escHtml(t.text)}</span>
            <input class="edit-input" value="${escAttr(t.text)}" data-action="saveEdit">
            <span class="todo-tags">${tags}</span>
            <button class="delete-btn" data-action="delete" title="${dT}">${dI}</button>
          </div>
          <div class="todo-sub">
            <select class="label-select" data-action="setLabel" title="标签">${labelOpts}</select>
            ${t.label?`<span class="tag label-tag" style="background:${getLabelColor(t.label)}">${escHtml(labelDisplay(t.label))}</span>`:''}
            <span class="timer-display">${fmtDuration(displaySec)}</span>

function addTodo(){
  const tx=todoInput.value.trim();if(!tx){todoInput.focus();return;}
  if(currentTaskType==='weekly'&&pickedWeekDays.size===0){alert('请至少选择一个重复的星期');return;}
  const nt={id:Date.now(),text:tx,type:currentTaskType,done:false,doneDate:null,createdDate:realToday(),label:'',timeLogs:[]};
  if(currentTaskType==='once')nt.date=getViewStr();
  else if(currentTaskType==='weekly')nt.weekDays=[...pickedWeekDays];
  todos.unshift(nt);
  todoInput.value='';todoInput.focus();
  currentTypeFilter='all';currentStatusFilter='all';updateFilterUI();renderTodo();
}

function toggleTodo(id){
  const t=todos.find(t=>t.id===id);if(!t)return;
  if(t.type==='once'){t.done=!t.done;if(t.done)t.doneDate=getViewStr();else t.doneDate=null;}
  else{if(isTaskDoneOnDate(t)){t.done=false;t.doneDate=null;}else{t.done=true;t.doneDate=getViewStr();}}
  renderTodo();
}

function deleteTodo(id){
  // Only used for recurring tasks: silently skip current day
  const t=todos.find(t=>t.id===id);if(!t||t.type==='once')return;
  const vs=getViewStr();
  if(!t.skipDates)t.skipDates=[];
  if(!t.skipDates.includes(vs))t.skipDates.push(vs);
  if(t.doneDate===vs){t.done=false;t.doneDate=null;}
  renderTodo();showToast(`⏭ 已跳过：${t.text}`);
}

function clearDone(){
  if(!todos.some(t=>t.type==='once'&&t.done)&&!todos.some(t=>t.type!=='once'&&isTaskDoneOnDate(t))){alert('没有已完成的事项可以清除');return;}
  if(!confirm('确定清除已完成事项？\n\n• 一次性：永久删除\n• 每日/每周：仅清除今天完成状态'))return;
  todos=todos.filter(t=>!(t.type==='once'&&t.done));
  for(const t of todos){if(t.type!=='once'&&t.done&&t.doneDate===getViewStr()){t.done=false;t.doneDate=null;}}
  renderTodo();
}

function resetToday(){
  if(!confirm('确定重置今天所有完成状态吗？（任务不会被删除）'))return;
  for(const t of todos){if(t.done&&t.doneDate===getViewStr()){t.done=false;t.doneDate=null;}}
  renderTodo();
}

function restoreSkipped(){
  const vs=getViewStr();
  const skipped=todos.filter(t=>t.type!=='once'&&t.skipDates&&t.skipDates.includes(vs));
  if(skipped.length===0){alert('当天没有被跳过的事项');return;}
  const names=skipped.map(t=>'• '+t.text).join('\n');
  if(!confirm(`恢复以下 ${skipped.length} 个事项到当天？\n\n${names}\n（取消则不恢复）`))return;
  for(const t of skipped){
    t.skipDates=t.skipDates.filter(d=>d!==vs);
  }
  renderTodo();showToast('🔙 已恢复 '+skipped.length+' 个事项');
}

// SHA-256 hash helper
async function sha256(msg){
  const buf=new TextEncoder().encode(msg);
  const hash=await crypto.subtle.digest('SHA-256',buf);
  return Array.from(new Uint8Array(hash)).map(b=>b.toString(16).padStart(2,'0')).join('');
}

      logoutBtn.textContent='👤 '+u+'（退出）';
      storageIndicator.textContent='☁️ 加载中…';
      const _tp=extractTimerPending();
      clearAllData();
      await pullFromCloud();
      applyPendingTimer(_tp);
      renderTodo();renderCd();renderCu();renderPie();renderLabels();renderColorSwatches();
      syncToCloud();
      todoInput.focus();
      _initSessionCheck(u);
    }
  }catch(e){loginErr.textContent='网络错误，请重试';console.error(e);}
  loginBtn.disabled=false;
}

// Silently verify token on page load
async function verifySession(){
  const u=localStorage.getItem('sync_user');
  const t=localStorage.getItem('sync_token');
  if(!u||!t)return false;
  try{
    const r=await fetch(SB_URL+'/rest/v1/rpc/check_login',{
      method:'POST',headers:{apikey:SB_KEY,Authorization:'Bearer '+SB_KEY,'Content-Type':'application/json'},
      body:JSON.stringify({p_user:u,p_hash:t})
    });
    if(!r.ok)return false;
    const ok=await r.json();
    if(ok===true||(Array.isArray(ok)&&ok.length>0&&ok[0])){
      currentUser=u;sessionToken=t;return true;
    }
  }catch(e){}
  // Session expired — clear
  localStorage.removeItem('sync_user');localStorage.removeItem('sync_token');
  return false;
}

function logout(){
  _cleanupSession(currentUser);
  currentUser='';sessionToken='';
  localStorage.removeItem('sync_user');localStorage.removeItem('sync_token');
  clearAllData();
  loginUser.value='';loginPass.value='';
  loginOverlay.style.display='flex';
  loginUser.focus();
  storageIndicator.textContent='💻 浏览器存储';
  renderTodo();renderCd();renderCu();renderPie();renderLabels();renderColorSwatches();
}

async function sbUpsert(table,body){
  try{
    const r=await fetch(SB_URL+'/rest/v1/'+table,{
      method:'POST',headers:{apikey:SB_KEY,Authorization:'Bearer '+SB_KEY,'Content-Type':'application/json',Prefer:'resolution=merge-duplicates'},
      body:JSON.stringify(body)
    });
    return r.ok;
  }catch(e){console.error('upsert err:',e);return false;}
}

async function sbGet(table,eqCol,eqVal){
  try{
    const r=await fetch(SB_URL+'/rest/v1/'+table+'?'+eqCol+'=eq.'+encodeURIComponent(eqVal)+'&select=*',{
      headers:{apikey:SB_KEY,Authorization:'Bearer '+SB_KEY}
    });
    if(!r.ok)return null;
    return await r.json();
  }catch(e){console.error('GET err:',e);return null;}
}

async function pushToCloud(){
  if(!currentUser||currentUser==='__guest__')return;
  // Pull current cloud state, merge timeLogs (keep larger), then push
  const cloudRows=await sbGet('user_data','user_id',currentUser);
  let mergedTds=todos;
  if(cloudRows&&cloudRows.length>0&&cloudRows[0].data&&cloudRows[0].data.todos){
    const ctodo=cloudRows[0].data.todos;
    const cmap={};for(const ct of ctodo)cmap[ct.id]=ct;
    mergedTds=todos.map(t=>{
      if(cmap[t.id]){
        const ct=cmap[t.id];
        const cTotal=(ct.timeLogs||[]).reduce((s,l)=>s+l.seconds,0);
        const lTotal=(t.timeLogs||[]).reduce((s,l)=>s+l.seconds,0);
        if(cTotal>lTotal){t.timeLogs=ct.timeLogs;t.done=ct.done;t.doneDate=ct.doneDate;t.skipDates=ct.skipDates;}
        delete cmap[t.id];
      }
      return t;
    });
    for(const[,ct]of Object.entries(cmap))mergedTds.push(ct);
  }
  const payload={todos:mergedTds,countdowns,countups,labels,updatedAt:Date.now()};
  const ok=await sbUpsert('user_data',{user_id:currentUser,data:payload});
  if(ok){
    storageIndicator.textContent='☁️ 已同步';
    storageIndicator.classList.add('file-mode');
    setTimeout(()=>{storageIndicator.textContent='💻 浏览器存储';storageIndicator.classList.remove('file-mode');},2000);
  }else{storageIndicator.textContent='⚠️ 同步失败';}
}

async function pullFromCloud(){
  if(!currentUser)return false;
  const rows=await sbGet('user_data','user_id',currentUser);
  if(!rows||rows.length===0)return false;
  const rd=rows[0].data;
  if(!rd)return false;
  if(rd.todos)for(const t of rd.todos){
    if(typeof t.label==='string'&&t.label){
      const lb=labels.find(l=>l.name===t.label);t.label=lb?lb.id:0;
    }
  }
  // Merge cloud data with local: for timeLogs, take the one with more total seconds
  if(rd.todos){
    const cmap={};for(const t of rd.todos)cmap[t.id]=t;
    for(const t of todos){
      if(cmap[t.id]){
        const ct=cmap[t.id];
        const cTotal=(ct.timeLogs||[]).reduce((s,l)=>s+l.seconds,0);
        const lTotal=(t.timeLogs||[]).reduce((s,l)=>s+l.seconds,0);
        if(lTotal>cTotal)t.timeLogs=t.timeLogs;// keep local (more complete)
        else{t.timeLogs=ct.timeLogs;t.done=ct.done;t.doneDate=ct.doneDate;t.skipDates=ct.skipDates;}
        delete cmap[t.id];
      }
    }
    // Add cloud-only todos
    for(const[_,ct]of Object.entries(cmap))todos.push(ct);
  }
  if(rd.countdowns)countdowns=rd.countdowns;
  if(rd.countups)countups=rd.countups;
  if(rd.labels)labels=rd.labels;
  saveList(SK,todos);saveList(CDK,countdowns);saveList(CUK,countups);
  localStorage.setItem('my_labels',JSON.stringify(labels));
  storageIndicator.textContent='☁️ 已加载云端数据';
  storageIndicator.classList.add('file-mode');
  setTimeout(()=>{storageIndicator.textContent='💻 浏览器存储';storageIndicator.classList.remove('file-mode');},2000);
  return true;
}

function saveTodos(){saveList(SK,todos);}

let _syncTimer=null;
function syncToCloud(){
  clearTimeout(_syncTimer);
  _syncTimer=setTimeout(pushToCloud,1500);
}

// =================== 读取并恢复未正常关闭的计时 ===================
function extractTimerPending(){
  const data=_readTimerFile();
  if(!data||!data.todoId||!data.startTime)return null;
  let elapsed=Math.floor((Date.now()-data.startTime)/1000);
  if(elapsed>14400)elapsed=14400; // 上限 4h
  if(elapsed<3)return null;
  return {todoId:data.todoId,seconds:elapsed};
}

function applyPendingTimer(pending){
  if(!pending||pending.seconds<=0)return;
  const t=todos.find(x=>x.id===pending.todoId);
  if(!t){localStorage.removeItem('_timer_state');return;}
  if(!t.timeLogs)t.timeLogs=[];
  const today=realToday();
  let existing=0;
  for(const l of t.timeLogs){if(l.date===today)existing+=l.seconds;}
  if(pending.seconds>existing){
    t.timeLogs=t.timeLogs.filter(l=>l.date!==today);
    t.timeLogs.push({date:today,seconds:pending.seconds});
    saveTodos();
    if(currentUser&&currentUser!=='__guest__'){clearTimeout(_syncTimer);pushToCloud();}
    renderPie();
  }
  localStorage.removeItem('_timer_state');
}


// =================== 同设备多标签保护：心跳锁 ===================
let isReadOnly=false;let _hbTimer=null;const _sid=Math.random().toString(36).slice(2)+Date.now();

const _safeSelectors=['#prevDayBtn','#nextDayBtn','#backTodayBtn','#viewDateDisplay','#viewDatePicker','#readonly-force-btn','.tp-btn','.filter-btn','#logoutBtn','#loginBtn','#guestBtn','.pie-legend-group','.pie-legend-item'];
const _safeCss=_safeSelectors.join(',');
let _roMo=null;

function _isSafe(el){return _safeSelectors.some(s=>el.matches(s)||el.closest(s));}

function _roDisableAll(){
  const safeEls=new Set(document.querySelectorAll(_safeCss));
  document.querySelectorAll('.container input,.container select,.container button,.container textarea').forEach(x=>{
    if(safeEls.has(x)||_isSafe(x))return;
    x.disabled=true;if(x.tagName==='INPUT'||x.tagName==='TEXTAREA')x.readOnly=true;
  });
  document.querySelectorAll('.container .check-box,.container .delete-btn,.container .timer-btn,.container .timer-input,.container .label-select,.container .existing-label,.container .file-btn,.container .preset-btn,.container .footer button,.container .color-swatch,.container .color-custom-btn,.container .color-pick-trigger')
  .forEach(x=>{if(!_isSafe(x)&&!safeEls.has(x))x.style.pointerEvents='none';});
  safeEls.forEach(x=>{if(x)x.style.pointerEvents='auto';});
  document.querySelectorAll('.tp-btn,.filter-btn').forEach(x=>x.style.pointerEvents='auto');
}

function _setupReadOnlyUI(){
  if(document.getElementById('roBanner'))return;
  const d=document.createElement('div');d.id='roBanner';
  d.style.cssText='background:#C49090;color:#FDFBFA;text-align:center;padding:5px 10px;font-size:13px;font-weight:600;display:flex;align-items:center;justify-content:center;gap:8px;';
  d.innerHTML='<span>🔒 只读模式 — 另一窗口正在操作</span><button id="readonly-force-btn">强制接管</button>';
  const c=document.querySelector('.container');if(c)c.insertBefore(d,c.firstChild);
  // 强制接管按钮
  d.querySelector('#readonly-force-btn').addEventListener('click',()=>{
    if(!confirm('确认强制接管为主操作窗口？\n其他窗口将变为只读模式。'))return;
    const key='_master_'+currentUser;
    localStorage.setItem(key,JSON.stringify({sid:_sid,ts:Date.now()}));
    _removeReadOnlyUI();isReadOnly=false;_startHeartbeat(currentUser);
    showToast('🟢 已强制接管为主操作窗口');
  });
  // 视觉 class
  document.body.classList.add('readonly-mode');
  _roDisableAll();
  _roMo=new MutationObserver(()=>_roDisableAll());
  _roMo.observe(document.querySelector('.container'),{childList:true,subtree:true});
  document.addEventListener('click',_roEventBlock,true);
  document.addEventListener('dblclick',_roEventBlock,true);
  document.addEventListener('keydown',_roEventBlock,true);
  document.addEventListener('change',_roEventBlock,true);
  document.addEventListener('input',_roEventBlock,true);
  if(activeTimer)pauseTimer();
}

function _roEventBlock(e){
  if(!document.getElementById('roBanner'))return;
  if(_isSafe(e.target))return;
  e.stopImmediatePropagation();e.preventDefault();
}

function _removeReadOnlyUI(){
  const d=document.getElementById('roBanner');if(d)d.remove();
  if(_roMo){_roMo.disconnect();_roMo=null;}
  document.body.classList.remove('readonly-mode');
  document.querySelectorAll('.container input,.container select,.container button,.container textarea').forEach(x=>{x.disabled=false;x.readOnly=false;});
  document.querySelectorAll('.container *').forEach(x=>{if(x.style.pointerEvents==='none')x.style.pointerEvents='';});
  document.removeEventListener('click',_roEventBlock,true);
  document.removeEventListener('dblclick',_roEventBlock,true);
  document.removeEventListener('keydown',_roEventBlock,true);
  document.removeEventListener('change',_roEventBlock,true);
  document.removeEventListener('input',_roEventBlock,true);
}

// 跨标签页即时通信：storage 事件
window.addEventListener('storage',e=>{
  if(!currentUser||currentUser==='__guest__')return;
  const key='_master_'+currentUser;
  if(e.key!==key)return;
  if(!e.newValue){return;} // 清空事件忽略
  try{
    const p=JSON.parse(e.newValue);
    if(p.sid!==_sid){
      // 另一个标签页抢占了主控权
      isReadOnly=true;_setupReadOnlyUI();
    }
  }catch(e){}
});

function _becomeMaster(uname){
  const key='_master_'+uname;
  const now=Date.now();
  const raw=localStorage.getItem(key);
  if(raw){try{const p=JSON.parse(raw);if(p.sid!==_sid&&now-p.ts<30000)return false;}catch(e){}}
  localStorage.setItem(key,JSON.stringify({sid:_sid,ts:now}));
  return true;
}
function _startHeartbeat(uname){
  if(_hbTimer)clearInterval(_hbTimer);
  const key='_master_'+uname;
  _hbTimer=setInterval(()=>{
    const raw=localStorage.getItem(key);
    try{if(raw&&JSON.parse(raw).sid!==_sid)return;}catch(e){}
    localStorage.setItem(key,JSON.stringify({sid:_sid,ts:Date.now()}));
  },5000);
}

let _roCheckTimer=null;

function _initSessionCheck(uname){
  setTimeout(()=>{
    if(!_becomeMaster(uname)){
      isReadOnly=true;_setupReadOnlyUI();
      _startAutoTakeoverCheck(uname);  // 定期检测主控是否离线
    }else{
      isReadOnly=false;_removeReadOnlyUI();_startHeartbeat(uname);
    }
  },800);
}

// 只读模式下每隔15秒检查主控心跳是否过期（>30秒无心跳）
function _startAutoTakeoverCheck(uname){
  if(_roCheckTimer)clearInterval(_roCheckTimer);
  _roCheckTimer=setInterval(()=>{
    const key='_master_'+uname;
    const raw=localStorage.getItem(key);
    if(!raw){_takeover(uname);return;}
    try{
      const p=JSON.parse(raw);
      if(Date.now()-p.ts>30000){_takeover(uname);}
    }catch(e){}
  },15000);
}

function _takeover(uname){
  if(_roCheckTimer)clearInterval(_roCheckTimer);
  _becomeMaster(uname);
  _removeReadOnlyUI();isReadOnly=false;
  _startHeartbeat(uname);
  showToast('🟢 主窗口已离线，本窗口接管为操作窗口');
}

function _cleanupSession(uname){
  if(_hbTimer)clearInterval(_hbTimer);_hbTimer=null;
  if(_roCheckTimer)clearInterval(_roCheckTimer);_roCheckTimer=null;
  localStorage.removeItem('_master_'+uname);
  _removeReadOnlyUI();isReadOnly=false;
}
